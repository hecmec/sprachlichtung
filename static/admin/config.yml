backend:
  name: github
  repo: hecmec/sprachlichtung
  branch: main
  # The site is hosted on GitHub Pages, not Netlify. Without this, Decap sends
  # site_id=hecmec.github.io to api.netlify.com/auth and Netlify returns 404
  # because no Netlify site matches that domain. site_domain points the OAuth
  # gateway at our Netlify "dummy" site that holds the GitHub OAuth provider.
  site_domain: heroic-seahorse-7f141c.netlify.app

media_folder: static/img/uploads
public_folder: /sprachlichtung/img/uploads

collections:
  - name: kritisches-denken
    label: "Kritisches Denken (DE)"
    folder: docs/kritisches-denken
    create: true
    extension: md
    format: frontmatter
    nested:
      depth: 100
      summary: "{{title}}"
      subfolders: false
    meta:
      path:
        widget: string
        label: "Path"
        index_file: "index"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - { label: "Sidebar position", name: sidebar_position, widget: number, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: kritisches-denken-en
    label: "Kritisches Denken (EN translation)"
    folder: i18n/en/docusaurus-plugin-content-docs/current/kritisches-denken
    create: true
    extension: md
    format: frontmatter
    nested:
