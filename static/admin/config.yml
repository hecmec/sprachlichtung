backend:
  name: github
  repo: hecmec/sprachlichtung
  branch: main
  # The site is on GitHub Pages, so it cannot complete the GitHub OAuth
  # handshake itself (no server, no client_secret). We route login through a
  # self-hosted OAuth proxy deployed to Netlify. The proxy must have the
  # GitHub OAuth App's CLIENT_ID and CLIENT_SECRET set as env vars in Netlify,
  # and the GitHub OAuth App's callback URL must be
  # https://heroic-seahorse-7f141c.netlify.app/callback (NOT api.netlify.com).
  base_url: https://heroic-seahorse-7f141c.netlify.app

media_folder: static/img/uploads
public_folder: /sprachlichtung/img/uploads

collections:
  - name: kritisches-denken
    label: "Kritisches Denken (DE)"
    folder: docs/kritisches-denken
    create: true
    extension: md
    format: frontmatter
    nested:
      depth: 100
      summary: "{{title}}"
      subfolders: false
    meta:
      path:
        widget: string
        label: "Path"
        index_file: "index"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - { label: "Sidebar position", name: sidebar_position, widget: number, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: kritisches-denken-en
    label: "Kritisches Denken (EN translation)"
    folder: i18n/en/docusaurus-plugin-content-docs/current/kritisches-denken
    create: true
    extension: md
    format: frontmatter
    nested:
      depth: 100
      summary: "{{title}}"
      subfolders: false
    meta:
      path:
        widget: string
        label: "Path"
        index_file: "index"
    fields:
